# GitHub Actions config
name: "Feishu Pages"
description: "将 Feishu Wiki 生成的内容转换为 Markdown 格式，以便与静态页面生成器配合使用。"
branding:
  icon: "book"
  color: "gray-dark"

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9
    
    - name: Get pnpm store directory
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
    
    - name: Setup pnpm cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ env.STORE_PATH }}
          node_modules
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-
    
    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
    
    - name: Build packages
      shell: bash
      run: pnpm build
    
    - name: Run feishu-pages
      shell: bash
      run: node packages/feishu-pages/dist/index.js
